<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Métis Trail V2 — UI Style Picker</title>
<style>
  :root {
    --preview-bg: #f4f1ea;
    --preview-ink: #1a1410;
    --preview-border: #b8a478;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ui-sans-serif, system-ui, sans-serif;
    background: var(--preview-bg);
    color: var(--preview-ink);
    padding: 24px;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.intro { font-size: 14px; color: #6a5e4b; margin-bottom: 24px; }
  .picker { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
  .card {
    background: #fff;
    border: 2px solid var(--preview-border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
  .card.selected { border-color: #8B2500; box-shadow: 0 0 0 3px rgba(139,37,0,.2); }
  .card-header { padding: 14px 16px; border-bottom: 1px solid var(--preview-border); display: flex; justify-content: space-between; align-items: center; }
  .card-header h2 { font-size: 16px; }
  .badge { font-size: 11px; background: #8B2500; color: #fff; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: .5px; }
  .preview { height: 260px; overflow: hidden; position: relative; }
  .preview iframe { width: 100%; height: 100%; border: none; }
  .meta { padding: 12px 16px; font-size: 12px; color: #6a5e4b; }
  .meta strong { color: #1a1410; }
  .choice { margin-top: 20px; padding: 16px; background: #fff; border: 2px solid #8B2500; border-radius: 10px; }
  .choice button { background: #1A1410; color: #E8DCC8; border: none; padding: 10px 18px; border-radius: 6px; font-family: inherit; cursor: pointer; font-size: 14px; }
  .choice button:hover { background: #2E2418; }
  .hidden { display: none; }
</style>
</head>
<body>
<h1>Métis Trail V2 — UI Style Picker</h1>
<p class="intro">Click a card to choose the visual direction. Each preview is a rendered mockup of the game shell (status bar + narrative + controls). We'll lock this before writing a single line of engine code.</p>

<div class="picker" id="picker">
  <!-- cards injected by JS -->
</div>

<div class="choice hidden" id="choice">
  <strong>Selected: <span id="sel-name"></span></strong>
  <p style="margin: 8px 0 12px; font-size: 13px;" id="sel-desc"></p>
  <button id="confirm">Lock This Direction — Start Building V2</button>
</div>

<script>
const STYLES = [
  {
    id: 'ledger',
    name: 'Ledger & Parchment',
    desc: 'Cream/sepia with ruled lines, typewriter warmth, brown ink. Feels like a trader\'s journal.',
    palette: ['#E8DCC8','#D6C8A8','#1A1410','#8B7355','#B8A478','#8B2500'],
    font: "'Rye', 'Alegreya', Georgia, serif",
    border: 'double 4px #8B7355',
    header: 'linear-gradient(180deg, #D6C8A8, #C8B89A)',
    btn: '#1A1410',
    btnText: '#E8DCC8',
  },
  {
    id: 'hbc',
    name: 'Hudson\'s Bay Blanket',
    desc: 'Cream + forest green + brass. Institutional warmth. Strong stripes, copper buttons.',
    palette: ['#F4F1EA','#2C4A1E','#A67C29','#1A1410','#E8DCC8','#8B2500'],
    font: "'Rye', 'Alegreya', Georgia, serif",
    border: '3px solid #2C4A1E',
    header: 'linear-gradient(180deg, #2C4A1E, #3A5F2A)',
    btn: '#A67C29',
    btnText: '#1A1410',
  },
  {
    id: 'mission',
    name: 'Mission Print',
    desc: 'Off-white with ragged edges, period letterpress feel, red rubrics. Dark, dramatic.',
    palette: ['#F1EBD8','#1A1410','#8B2500','#D6C8A8','#3A2A1A','#BF3B1A'],
    font: "'Rye', 'Alegreya', Georgia, serif",
    border: '2px solid #1A1410',
    header: 'linear-gradient(180deg, #3A2A1A, #2A1C10)',
    btn: '#8B2500',
    btnText: '#F1EBD8',
  },
  {
    id: 'prairie',
    name: 'Prairie Dust',
    desc: 'Warm washed-out yellows, minimal chrome, maximum readability. Folk-modern clarity.',
    palette: ['#F6F1E1','#C8B89A','#4A4238','#8B7355','#E8DCC8','#6D5D45'],
    font: "'Rye', 'Alegreya', Georgia, serif",
    border: '1px solid #C8B89A',
    header: 'linear-gradient(180deg, #E8DCC8, #DDD0B8)',
    btn: '#4A4238',
    btnText: '#F6F1E1',
  }
];

function renderPreview(style) {
  return `
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Alegreya:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: ${style.font};
    background: ${style.palette[0]};
    color: ${style.palette[2]};
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #status {
    background: ${style.palette[2]};
    color: ${style.palette[0]};
    padding: 8px 14px;
    display: flex;
    justify-content: space-between;
    border-bottom: ${style.border};
    font-size: 11px;
  }
  #status .label { color: ${style.palette[3]}; text-transform: uppercase; letter-spacing: .4px; font-size: 9px; font-family: ${style.font}; }
  #status .val { font-weight: 600; }
  #narrative {
    flex: 1;
    padding: 14px 18px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.7;
    background: ${style.palette[0]};
  }
  #controls {
    padding: 10px 14px;
    background: ${style.palette[1]};
    display: flex;
    gap: 8px;
    border-top: ${style.border};
  }
  .btn {
    flex: 1;
    background: ${style.btn};
    color: ${style.btnText};
    border: none;
    padding: 10px;
    border-radius: 6px;
    font-family: ${style.font};
    font-size: 12px;
    cursor: pointer;
  }
  .day {
    font-family: ${style.font};
    color: ${style.palette[5]};
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .text { margin: 4px 0; }
  .quote {
    margin: 10px 0;
    padding: 8px 10px;
    background: ${style.palette[1]};
    border-left: 3px solid ${style.palette[5]};
    font-style: italic;
    font-size: 11px;
  }
  .choice {
    background: ${style.palette[1]};
    border: 2px solid ${style.palette[5]};
    padding: 8px 10px;
    margin: 4px 0;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div id="status">
    <div><span class="label">Day </span><span class="val">12</span></div>
    <div><span class="label">July 3</span></div>
    <div><span class="label">Fort Ellice</span></div>
    <div><span class="label">Food </span><span class="val">14</span></div>
    <div><span class="label">Wear </span><span class="val">2</span></div>
    <div><span class="label">Crew </span><span class="val">Rested</span></div>
  </div>
  <div id="narrative">
    <div class="day">Day 12 — On the trail to Touchwood Hills</div>
    <div class="text">The prairie stretches flat in every direction. Grass to the horizon. Your ox plods steady.</div>
    <div class="day" style="margin-top:10px">Day 13 — Prairie Fire</div>
    <div class="text">Smoke on the horizon. Not campfire smoke — a thick, grey-brown column rising from the prairie to the south. The wind is carrying it your way.</div>
    <div class="quote">📜 "We saw the smoke of the prairie fire every afternoon... the oxen grew restless."<br>— Father Lacombe, <em>Journals</em>, 1878</div>
    <div class="choice">Push ahead and try to outrun it (DC 13)</div>
    <div class="choice">Detour south to find a crossing</div>
  </div>
  <div id="controls">
    <button class="btn">Travel 1 Day</button>
    <button class="btn">Make Camp</button>
    <button class="btn">Cart</button>
    <button class="btn">Crew</button>
  </div>
</body>
</html>`;
}

const picker = document.getElementById('picker');
let selected = null;

STYLES.forEach(s => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.id = s.id;
  card.innerHTML = `
    <div class="card-header"><h2>${s.name}</h2><span class="badge">${s.id}</span></div>
    <div class="preview"><iframe src="data:text/html;charset=utf-8,${encodeURIComponent(renderPreview(s))}"></iframe></div>
    <div class="meta"><strong>Feels like:</strong> ${s.desc}<br><strong>Palette:</strong> ${s.palette.join(' / ')}</div>
  `;
  card.onclick = () => {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selected = s;
    document.getElementById('choice').classList.remove('hidden');
    document.getElementById('sel-name').textContent = s.name;
    document.getElementById('sel-desc').textContent = s.desc;
  };
  picker.appendChild(card);
});

document.getElementById('confirm').onclick = () => {
  if (!selected) return;
  const btn = document.getElementById('confirm');
  btn.textContent = 'Saved to localStorage. Next step coming...';
  btn.disabled = true;
  localStorage.setItem('metis-v2-style', JSON.stringify(selected));
  setTimeout(() => {
    alert(`Style locked: ${selected.name}\n\nNow I'll scaffold the v2 repo with this direction.`);
  }, 300);
};
</script>
</body>
</html>
