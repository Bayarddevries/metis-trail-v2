<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Métis Trail V2</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script type="module" src="./app.js"></script>
<style>
  :root {
    --clr-bg: #E8DCC8;
    --clr-bg-dark: #D6C8A8;
    --clr-ink: #1A1410;
    --clr-accent: #8B2500;
    --clr-border: #B8A478;
    --clr-status-bg: #1A1410;
    --clr-status-text: #E8DCC8;
    --clr-overlay-bg: rgba(26,20,16,0.92);
    --font-heading: 'Rye', 'Georgia', serif;
    --font-body: 'Alegreya', 'Georgia', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font-body); color: var(--clr-ink); background: var(--clr-bg); }
  #game-container { display: flex; flex-direction: column; height: 100vh; }
  #status-bar { display: flex; gap: 12px; padding: 8px 14px; background: var(--clr-status-bg); color: var(--clr-status-text); font-size: 12px; align-items: center; border-bottom: 2px solid var(--clr-accent); }
  .stat-label { color: #C8B888; font-size: 10px; text-transform: uppercase; letter-spacing: .4px; font-family: var(--font-heading); }
  .stat-value { font-weight: 600; }
  .segment-progress { flex: 1; text-align: center; font-size: 11px; color: var(--clr-accent); }
  .food-low { color: #e74c3c; }
  .wear-high { color: #e74c3c; }
  #map-panel { flex: 1; min-height: 0; position: relative; }
  #map { width: 100%; height: 100%; background: #D8CCB0; }
  #bottom-panel { height: 28vh; min-height: 160px; display: flex; flex-direction: column; border-top: 3px solid var(--clr-accent); }
  #narrative { flex: 1; padding: 10px 18px; overflow-y: auto; font-size: 14px; line-height: 1.7; }
  .scene-text { margin: 4px 0; }
  #controls { display: flex; gap: 8px; padding: 10px 14px; background: var(--clr-bg-dark); border-top: 1px solid var(--clr-accent); }
  .ctrl-btn { flex: 1; background: var(--clr-ink); color: var(--clr-bg); border: none; padding: 10px; border-radius: 6px; font-family: var(--font-heading); font-size: 12px; cursor: pointer; }
  .ctrl-btn:hover { background: #2E2418; }
  .overlay { display: none; position: fixed; inset: 0; background: var(--clr-overlay-bg); z-index: 2000; align-items: center; justify-content: center; }
  .overlay.active { display: flex; }
  .overlay-card { background: var(--clr-bg); border: 2px solid var(--clr-accent); border-radius: 10px; max-width: 580px; width: 92%; max-height: 85%; overflow-y: auto; padding: 24px; }
  .choice-btn { display: block; width: 100%; padding: 10px 14px; background: var(--clr-bg-dark); border: 2px solid var(--clr-accent); border-radius: 4px; font-family: var(--font-body); font-size: 13px; color: var(--clr-ink); cursor: pointer; text-align: left; margin: 4px 0; }
  .end-card { text-align: center; }
  .restart-btn { background: var(--clr-ink); color: var(--clr-bg); border: none; padding: 10px 32px; border-radius: 6px; font-family: var(--font-heading); cursor: pointer; margin-top: 12px; }
  .start-btn { background: var(--clr-ink); color: var(--clr-bg); border: none; padding: 10px 32px; border-radius: 6px; font-family: var(--font-heading); font-size: 16px; cursor: pointer; margin-top: 12px; }
  .intro-card { text-align: center; }
  .score-row { font-size: 18px; font-weight: 700; }
</style>
</head>
<body>
<div id="game-root"></div>
<script type="module" src="./app.js"></script>
</body>
</html>
