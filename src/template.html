<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Métis Trail V2</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  :root {
    --clr-bg: #E8DCC8;
    --clr-bg-dark: #D6C8A8;
    --clr-ink: #1A1410;
    --clr-accent: #8B2500;
    --clr-border: #B8A478;
    --clr-status-bg: #1A1410;
    --clr-status-text: #E8DCC8;
    --clr-overlay-bg: rgba(26,20,16,0.92);
    --font-heading: 'Rye', 'Georgia', serif;
    --font-body: 'Alegreya', 'Georgia', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font-body); color: var(--clr-ink); background: var(--clr-bg); }
  #game-root { height: 100vh; }
</style>
</head>
<body>
<div id="game-root"></div>
<script type="module" src="./app.js"></script>
</body>
</html>
