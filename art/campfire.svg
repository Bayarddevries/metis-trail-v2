<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120">
  <defs>
    <radialGradient id="glow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#ff8c28" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#ff6600" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="log" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3a1a"/>
      <stop offset="100%" stop-color="#3a2210"/>
    </linearGradient>
    <linearGradient id="flame1" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="40%" stop-color="#ff8800"/>
      <stop offset="70%" stop-color="#ffcc22"/>
      <stop offset="100%" stop-color="#ffee88"/>
    </linearGradient>
    <linearGradient id="flame2" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="50%" stop-color="#ffaa22"/>
      <stop offset="100%" stop-color="#ffdd66"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Ground glow -->
  <ellipse cx="150" cy="110" rx="100" ry="20" fill="url(#glow)"/>

  <!-- Logs -->
  <g transform="translate(150,100)">
    <!-- Back log -->
    <ellipse cx="0" cy="8" rx="55" ry="10" fill="#2a1a0a"/>
    <!-- Left log -->
    <ellipse cx="-20" cy="2" rx="40" ry="8" fill="url(#log)" transform="rotate(-15)"/>
    <!-- Right log -->
    <ellipse cx="20" cy="2" rx="40" ry="8" fill="url(#log)" transform="rotate(15)"/>
    <!-- Front log -->
    <ellipse cx="0" cy="10" rx="50" ry="8" fill="#4a2a12"/>
    <!-- Log ends (circles) -->
    <circle cx="-38" cy="-4" r="7" fill="#5a3a1a" stroke="#3a2210" stroke-width="1"/>
    <circle cx="38" cy="-4" r="7" fill="#5a3a1a" stroke="#3a2210" stroke-width="1"/>
  </g>

  <!-- Main flame -->
  <g filter="url(#blur2)">
    <path d="M150,95 C130,80 115,50 125,25 C130,15 140,5 150,0 C160,5 170,15 175,25 C185,50 170,80 150,95Z" fill="url(#flame1)" opacity="0.9"/>
  </g>

  <!-- Inner flame -->
  <g filter="url(#blur1)">
    <path d="M150,95 C138,82 130,55 135,35 C138,25 144,15 150,10 C156,15 162,25 165,35 C170,55 162,82 150,95Z" fill="url(#flame2)" opacity="0.8"/>
  </g>

  <!-- Core flame (brightest) -->
  <path d="M150,95 C144,88 140,65 143,45 C145,35 148,25 150,20 C152,25 155,35 157,45 C160,65 156,88 150,95Z" fill="#ffeeaa" opacity="0.6"/>

  <!-- Embers / sparks -->
  <circle cx="140" cy="30" r="1.5" fill="#ffaa44" opacity="0.7"/>
  <circle cx="155" cy="22" r="1" fill="#ffcc66" opacity="0.6"/>
  <circle cx="148" cy="15" r="1.2" fill="#ffdd88" opacity="0.5"/>
  <circle cx="162" cy="35" r="1" fill="#ffaa44" opacity="0.5"/>
  <circle cx="135" cy="40" r="0.8" fill="#ff8833" opacity="0.6"/>

  <!-- Smoke wisps (subtle) -->
  <path d="M148,5 C145,-5 140,-15 143,-25" stroke="#888" stroke-width="1" fill="none" opacity="0.15" filter="url(#blur1)"/>
  <path d="M152,8 C155,-2 160,-12 157,-22" stroke="#888" stroke-width="0.8" fill="none" opacity="0.1" filter="url(#blur1)"/>
</svg>
